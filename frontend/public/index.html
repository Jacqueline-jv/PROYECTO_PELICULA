<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería de Imágenes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }
    .gallery img {
      max-width: 300px;
      width: 100%;
      height: auto;
      border: 2px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Galería de Imágenes</h1>
  <div class="gallery">
    <!-- Usa URL encoding para espacios -->
    <img src="El padrino.jpeg" alt="El padrino">
    <img src="Onterstellar.jpeg" alt="Onterstellar">
    <img src="La momia.jpeg" alt="La momia">
    <img src="Matrix.jpeg" alt="Matrix">
    <img src="Norbit.jpeg" alt="Norbit">
    <img src="Piratas del caribe.jpeg" alt="Piratas del caribe">
    <img src="shrek.jpeg" alt="Shrek">
  </div>
</body>
</html>
